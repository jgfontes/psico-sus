spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: queue
    show-sql: false
  jackson:
    default-property-inclusion: non_null

jwt:
  secret: test-secret

psicosus:
  events:
    exchange: psicosus.events
  queue:
    timeout-minutes: 30
  services:
    availability-service-url: http://localhost:19999
